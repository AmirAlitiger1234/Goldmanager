    const rules = this.rules();
    for (const item of rules.intents) {
      for (const w of item.words) {
        const pattern = w.includes('*') ? w.replace(/\s+/g, '\\s*').replace(/\*/g,'.*') : null;
        if (pattern) {
          const re = new RegExp(pattern, 'i');
          if (re.test(text)) return item.op;
        } else if (text.includes(w)) {
          return item.op;
        }
      }
    }
    return null;
  },

  extractNumbers(text) {
    const norm = Normalize.toEnglishDigits(text);
    const matches = norm.match(/\d+([.,]\d+)?/g) || [];
    return matches.map(m => parseFloat(m.replace(',', '.')));
  },

  extractQty(text) {
    const rules = this.rules();
    const norm = Normalize.toEnglishDigits(text);
    const unitPattern = rules.unitNoise.filter(u => !/تومان|میلیون|ریال|\$/.test(u)).join('|');
    if (unitPattern) {
      const re = new RegExp(`(\\d+)\\s*(?:${unitPattern})`, 'i');
      const m = norm.match(re);
      if (m) return parseFloat(m[1]);
    }
    for (const [word, val] of Object.entries(rules.qtyWords)) {
      if (norm.includes(word)) return val;
    }
    const nums = this.extractNumbers(norm);
    return nums.length ? nums[0] : null;
  },

  extractWeightQty(text) {
    const rules = this.rules();
    if (!rules.weightUnits) return null;
    const norm = Normalize.toEnglishDigits(Normalize.softNormalize(text));

    if (rules.halfKgWords && rules.halfKgWords.some(w => norm.includes(w))) return 500;

    const kgWords = rules.weightUnits.kg.slice().sort((a, b) => b.length - a.length).join('|');
    const gWords = rules.weightUnits.g.slice().sort((a, b) => b.length - a.length).join('|');

    if (kgWords) {
      const reKg = new RegExp(`(\\d+(?:\\.\\d+)?)\\s*(?:${kgWords})`, 'i');
      const mKg = norm.match(reKg);
      if (mKg) return parseFloat(mKg[1]) * 1000;
    }
    if (gWords) {
      const reG = new RegExp(`(\\d+(?:\\.\\d+)?)\\s*(?:${gWords})`, 'i');
      const mG = norm.match(reG);
      if (mG) return parseFloat(mG[1]);
    }
    return null;
  },

  extractPrice(text) {
    const rules = this.rules();
    const norm = Normalize.toEnglishDigits(text);
    for (const marker of rules.priceMarkers) {
      const idx = norm.indexOf(marker);
      if (idx >= 0) {
        const after = norm.slice(idx);
        const m = after.match(/\d+([.,]\d+)?/);
        if (m) {
          let val = parseFloat(m[0].replace(',', '.'));
          if (/میلیون/.test(norm)) val *= 1000000;
          else if (/هزار/.test(norm)) val *= 1000;
          return val;
        }
      }
    }
    return null;
  },

  extractPayment(text) {
    const rules = this.rules();
    const norm = Normalize.softNormalize(text);
    for (const [word, val] of Object.entries(rules.paymentWords)) {
      if (norm.includes(word)) return val;
    }
    return null;
  },

  extractDiscount(text) { return this._extractMarkedNumber(text, this.rules().discountMarkers); },
  extractTax(text) { return this._extractMarkedNumber(text, this.rules().taxMarkers); },

  _extractMarkedNumber(text, markers) {
    const norm = Normalize.toEnglishDigits(text);
    for (const marker of markers) {
      const idx = norm.indexOf(marker);
      if (idx >= 0) {
        const after = norm.slice(idx);
        const m = after.match(/\d+([.,]\d+)?/);
        if (m) return parseFloat(m[0].replace(',', '.'));
      }
    }
    return null;
  },

  extractDate(text) {
    const rules = this.rules();
    const norm = Normalize.softNormalize(text);
    if (rules.todayWords.some(w => norm.includes(w))) return Date.now();
    return Date.now();
  },

  extractItemPhrase(text, opWords) {
    const rules = this.rules();
    let norm = Normalize.softNormalize(text);
    opWords.forEach(w => { norm = norm.replace(w, ' '); });
    rules.unitNoise.forEach(w => { norm = norm.split(w).join(' '); });
    if (rules.weightUnits) {
      [...rules.weightUnits.kg, ...rules.weightUnits.g].forEach(w => { norm = norm.split(w).join(' '); });
    }
    if (rules.halfKgWords) rules.halfKgWords.forEach(w => { norm = norm.split(w).join(' '); });
    norm = Normalize.toEnglishDigits(norm).replace(/\d+([.,]\d+)?/g, ' ');
    const stop = ['را','رو','به','از','برای','با','هم','یک','عدد','دانه','تا','امروز','این ماه','در'];
    stop.forEach(w => { norm = norm.split(new RegExp(`\\b${w}\\b`)).join(' '); });
    norm = norm.replace(/\s+/g, ' ').trim();
    return norm;
  },

  extractCustomerName(text) {
    const norm = Normalize.softNormalize(text);
    let m = norm.match(/برای\s+([آ-یa-z0-9]+)/i);
    if (m) return m[1];
    m = norm.match(/for\s+([a-z0-9]+)/i);
    if (m) return m[1];
    return null;
  },

  extractPhone(text) {
    const norm = Normalize.toEnglishDigits(text);
    const m = norm.match(/\d{8,13}/);
    return m ? m[0] : null;
  },

  extractInvoiceNumber(text) {
    const norm = Normalize.toEnglishDigits(text);
    const m = norm.match(/(?:شماره|number|#)\s*(\d+)/i) || norm.match(/(\d+)/);
    return m ? parseInt(m[1]) : null;
  }
};

</script>
<script>
/* =========================================================================
   Command Engine — موتور پردازش اصلی دستورات
   ========================================================================= */

const CommandEngine = {
  pending: null,

  async process(rawText, langCode) {
    NLU.setLang(langCode);

    if (this.pending) {
      return await this._continuePending(rawText);
    }

    const op = NLU.detectIntent(rawText);
    if (!op) return { type: 'unknown' };

    const cmd = { op, raw: rawText, createdAt: Date.now() };

    switch (op) {
      case 'SALE': case 'PURCHASE': case 'RETURN':
        return await this._buildInvoiceCommand(cmd, rawText);
      case 'STOCK_INC': case 'STOCK_DEC':
        return await this._buildStockCommand(cmd, rawText);
      case 'PRICE_CHANGE':
        return await this._buildPriceCommand(cmd, rawText);
      case 'DELETE_INVOICE':
        return await this._buildDeleteInvoiceCommand(cmd, rawText);
      case 'NEW_CUSTOMER':
        return await this._buildNewPartyCommand(cmd, rawText, 'customers');
      case 'NEW_SUPPLIER':
        return await this._buildNewPartyCommand(cmd, rawText, 'suppliers');
      case 'QUERY_STOCK':
        return await this._queryStock(rawText);
      case 'QUERY_SALES':
        return await this._querySales();
      case 'QUERY_PROFIT':
        return await this._queryProfit();
      default:
        return { type: 'unknown' };
    }
  },

  async _buildInvoiceCommand(cmd, text) {
    const opWordsFlat = LangRules[NLU.currentLang].intents.find(i => i.op === cmd.op).words;
    const itemPhrase = NLU.extractItemPhrase(text, opWordsFlat);
    const items = await DB.getAll('items');

    const extractedCustomFields = Normalize.extractCustomFieldsHeuristically(text);

    let match = Normalize.findVariantMatch(itemPhrase, extractedCustomFields, items);
    if (!match && extractedCustomFields.length === 0) {
      match = Normalize.bestMatch(itemPhrase, items);
    }

    cmd.price = NLU.extractPrice(text);
    cmd.discount = NLU.extractDiscount(text) || 0;
    cmd.tax = NLU.extractTax(text) || 0;
    cmd.payment = NLU.extractPayment(text);
    cmd.date = NLU.extractDate(text);
    cmd.customerName = NLU.extractCustomerName(text);
    cmd.customerPhone = NLU.extractPhone(text);
    cmd.itemPhrase = itemPhrase;
    cmd._rawText = text;

    if (!match) {
      if (cmd.op === 'PURCHASE' || cmd.op === 'SALE') {
        const name = Normalize.getBaseName(itemPhrase || "کالای جدید", extractedCustomFields);
        
        const newItem = {
          id: DB.uid(),
          name: name,
          aliases: [],
          stock: 0,
          buyPrice: cmd.price || 0,
          sellPrice: (cmd.price ? cmd.price * 1.2 : 0),
          minStock: 0,
          customFields: extractedCustomFields,
          createdAt: Date.now()
        };
        
        await DB.put('items', newItem);
        await DB.addTimeline({
          refType: 'item',
          refId: newItem.id,
          action: 'create',
          text: `ایجاد خودکار کالا با ویژگی‌های تفکیک‌شده: ${newItem.name}`,
          meta: {}
        });
        
        cmd.itemId = newItem.id;
        cmd.itemName = newItem.name;
        cmd.qty = this._extractQtyForItem(text, newItem) || 1;
        
        return await this._fillMissingInvoiceSlots(cmd);
      } else {
        const suggestions = Normalize.smartSearch(itemPhrase, items, { threshold: 0.35, limit: 4 });
        this.pending = { cmd, missing: 'ITEM_RESOLVE', suggestions, itemPhrase };
        return { type: 'itemNotFound', itemPhrase, suggestions: suggestions.map(s => s.entity) };
      }
    }

    const item = match.entity;
    if (extractedCustomFields.length > 0) {
      item.customFields = Normalize.mergeCustomFields(item.customFields, extractedCustomFields);
      await DB.put('items', item);
    }

    cmd.itemId = item.id;
    cmd.itemName = item.name;
    cmd.qty = this._extractQtyForItem(text, item) || 1;

    return await this._fillMissingInvoiceSlots(cmd);
  },

  _extractQtyForItem(text, item) {
    if (item && item.weightBased) {
      const w = NLU.extractWeightQty(text);
      if (w != null) return w;
      const plain = NLU.extractQty(text);
      return plain != null ? plain * 1000 : null;
    }
    return NLU.extractQty(text);
  },

  async _fillMissingInvoiceSlots(cmd) {
    if (!cmd.qty) { this.pending = { cmd, missing: 'qty' }; return { type: 'ask', field: 'askQty' }; }
    if (!cmd.price && cmd.op !== 'RETURN') {
      const item = await DB.get('items', cmd.itemId);
      cmd.price = cmd.op === 'SALE' ? item.sellPrice : item.buyPrice;
      if (!cmd.price) { this.pending = { cmd, missing: 'price' }; return { type: 'ask', field: 'askPrice' }; }
    }
    if (cmd.op === 'SALE') {
      if (!cmd.customerName) { this.pending = { cmd, missing: 'customerName' }; return { type: 'ask', field: 'askCustomer' }; }
      if (!cmd.customerPhone) { this.pending = { cmd, missing: 'customerPhone' }; return { type: 'ask', field: 'askCustomerPhone' }; }
    }
    if (!cmd.payment) { this.pending = { cmd, missing: 'payment' }; return { type: 'ask', field: 'askPayment' }; }

    return await this._executeInvoice(cmd);
  },

  async _executeInvoice(cmd) {
    const item = await DB.get('items', cmd.itemId);
    if ((cmd.op === 'SALE' || cmd.op === 'RETURN') && cmd.op === 'SALE' && item.stock < cmd.qty) {
      return { type: 'error', message: I18n.t('chat.notEnoughStock', { stock: item.stock }) };
    }

    if (item) {
      if (cmd.op === 'PURCHASE') {
        item.buyPrice = cmd.price;
      } else if (cmd.op === 'SALE') {
        item.sellPrice = cmd.price;
      }
      await DB.put('items', item);
    }

    const invoiceStore = cmd.op === 'PURCHASE' ? 'purchaseInvoices' : 'salesInvoices';
    const number = await DB.nextId(invoiceStore + '_counter');
    const qtyForPrice = item.weightBased ? cmd.qty / 1000 : cmd.qty;
    const total = (cmd.price * qtyForPrice) - (cmd.discount || 0) + (cmd.tax || 0);

    const invoice = {
      id: DB.uid(), number, itemId: cmd.itemId, itemName: item.name,
      qty: cmd.qty, price: cmd.price, discount: cmd.discount || 0, tax: cmd.tax || 0,
      total, payment: cmd.payment || 'cash', customerName: cmd.customerName || null,
      customerPhone: cmd.customerPhone || null,
      date: cmd.date || Date.now(), type: cmd.op
    };
    await DB.put(invoiceStore, invoice);

    if (cmd.op === 'PURCHASE') item.stock = (item.stock || 0) + cmd.qty;
    else if (cmd.op === 'SALE') item.stock = (item.stock || 0) - cmd.qty;
    else if (cmd.op === 'RETURN') item.stock = (item.stock || 0) + cmd.qty;
    await DB.put('items', item);

    await DB.addTimeline({
      refType: 'item', refId: item.id, action: cmd.op,
      text: `${cmd.op} ${cmd.qty} x ${item.name}`, meta: { invoiceId: invoice.id, number }
    });
    await DB.addTimeline({
      refType: 'invoice', refId: invoice.id, action: 'create',
      text: `${cmd.op} invoice #${number}`, meta: {}
    });

    this.pending = null;
    const key = cmd.op === 'SALE' ? 'confirmSale' : cmd.op === 'PURCHASE' ? 'confirmPurchase' : 'confirmReturn';
    return { type: 'confirm', messageKey: key, invoice };
  },

  async _buildStockCommand(cmd, text) {
    const opWords = LangRules[NLU.currentLang].intents.find(i => i.op === cmd.op).words;
    const itemPhrase = NLU.extractItemPhrase(text, opWords);
    const items = await DB.getAll('items');
    const match = Normalize.bestMatch(itemPhrase, items);
    cmd._rawText = text;

    if (!match) {
      const suggestions = Normalize.smartSearch(itemPhrase, items, { threshold: 0.35, limit: 4 });
      this.pending = { cmd, missing: 'ITEM_RESOLVE', suggestions, itemPhrase };
      return { type: 'itemNotFound', itemPhrase, suggestions: suggestions.map(s => s.entity) };
    }
    cmd.itemId = match.entity.id; cmd.itemName = match.entity.name;
    cmd.qty = this._extractQtyForItem(text, match.entity);

    if (!cmd.qty) { this.pending = { cmd, missing: 'qty' }; return { type: 'ask', field: 'askQty' }; }
    return await this._executeStockChange(cmd);
  },

  async _executeStockChange(cmd) {
    const item = await DB.get('items', cmd.itemId);
    const delta = cmd.op === 'STOCK_INC' ? cmd.qty : -cmd.qty;
    item.stock = (item.stock || 0) + delta;
    await DB.put('items', item);
    await DB.addTimeline({ refType: 'item', refId: item.id, action: 'stock_update', text: `stock ${delta > 0 ? '+' : ''}${delta}`, meta: {} });
    this.pending = null;
    return { type: 'confirm', messageKey: 'confirmStockUpdate', item };
  },

  async _buildPriceCommand(cmd, text) {
    const opWords = LangRules[NLU.currentLang].intents.find(i => i.op === cmd.op).words;
    const itemPhrase = NLU.extractItemPhrase(text, opWords);
    const items = await DB.getAll('items');
    const match = Normalize.bestMatch(itemPhrase, items);
    cmd.price = NLU.extractPrice(text) || NLU.extractNumbers(text).slice(-1)[0];

    if (!match) {
      const suggestions = Normalize.smartSearch(itemPhrase, items, { threshold: 0.35, limit: 4 });
      this.pending = { cmd, missing: 'ITEM_RESOLVE', suggestions, itemPhrase };
      return { type: 'itemNotFound', itemPhrase, suggestions: suggestions.map(s => s.entity) };
    }
    cmd.itemId = match.entity.id; cmd.itemName = match.entity.name;

    if (!cmd.price) { this.pending = { cmd, missing: 'price' }; return { type: 'ask', field: 'askPrice' }; }
    return await this._executePriceChange(cmd);
  },

  async _executePriceChange(cmd) {
    const item = await DB.get('items', cmd.itemId);
    const old = item.sellPrice;
    item.sellPrice = cmd.price;
    await DB.put('items', item);
    await DB.addTimeline({ refType: 'item', refId: item.id, action: 'price_change', text: `price ${old} -> ${cmd.price}`, meta: {} });
    this.pending = null;
    return { type: 'confirm', messageKey: 'confirmPriceUpdate', item };
  },

  async _buildDeleteInvoiceCommand(cmd, text) {
    const num = NLU.extractInvoiceNumber(text);
    if (!num) { this.pending = { cmd, missing: 'invoiceNumber' }; return { type: 'ask', field: 'askInvoiceNumber' }; }
    const sales = await DB.getAll('salesInvoices');
    const purchases = await DB.getAll('purchaseInvoices');
    const inv = sales.find(i => i.number === num) || purchases.find(i => i.number === num);
    if (!inv) return { type: 'error', message: I18n.t('chat.invoiceNotFound') };

    const store = sales.includes(inv) ? 'salesInvoices' : 'purchaseInvoices';
    const item = await DB.get('items', inv.itemId);
    if (item) {
      item.stock += (store === 'salesInvoices') ? inv.qty : -inv.qty;
      await DB.put('items', item);
    }
    await DB.delete(store, inv.id);
    await DB.addTimeline({ refType: 'invoice', refId: inv.id, action: 'delete', text: `deleted invoice #${num}`, meta: {} });
    return { type: 'confirm', messageKey: 'confirmDeleteInvoice' };
  },

  async _buildNewPartyCommand(cmd, text, store) {
    const name = NLU.extractCustomerName(text) || NLU.extractItemPhrase(text, LangRules[NLU.currentLang].intents.find(i => i.op === cmd.op).words);
    if (!name) { this.pending = { cmd: { ...cmd, store }, missing: 'partyName' }; return { type: 'ask', field: 'askItem' }; }
    const party = { id: DB.uid(), name, phone: '', address: '', balance: 0, createdAt: Date.now() };
    await DB.put(store, party);
    await DB.addTimeline({ refType: store === 'customers' ? 'customer' : 'supplier', refId: party.id, action: 'create', text: `created ${name}`, meta: {} });
    this.pending = null;
    return { type: 'confirm', messageKey: store === 'customers' ? 'confirmNewCustomer' : 'confirmNewSupplier', party };
  },

  async _queryStock(text) {
    const opWords = ['موجودی','چند','چقدر','stock','how many','in'];
    const itemPhrase = NLU.extractItemPhrase(text, opWords);
    const items = await DB.getAll('items');
    const match = Normalize.bestMatch(itemPhrase, items);
    if (!match) {
      const suggestions = Normalize.smartSearch(itemPhrase, items, { threshold: 0.3, limit: 4 });
      return { type: 'itemNotFound', itemPhrase, suggestions: suggestions.map(s => s.entity) };
    }
    return { type: 'result', resultType: 'stock', item: match.entity };
  },

  async _querySales() {
    const sales = await DB.getAll('salesInvoices');
    const startOfDay = new Date(); startOfDay.setHours(0,0,0,0);
    const today = sales.filter(s => s.date >= startOfDay.getTime());
    const total = today.reduce((a, s) => a + s.total, 0);
    return { type: 'result', resultType: 'sales', count: today.length, total };
  },

  async _queryProfit() {
    const sales = await DB.getAll('salesInvoices');
    const items = await DB.getAll('items');
    const itemMap = Object.fromEntries(items.map(i => [i.id, i]));
    const now = new Date();
    const monthSales = sales.filter(s => {
      const d = new Date(s.date);
      return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
    });
    let profit = 0;
    monthSales.forEach(s => {
      const item = itemMap[s.itemId];
      const qtyForPrice = item?.weightBased ? s.qty / 1000 : s.qty;
      const cost = item ? item.buyPrice * qtyForPrice : 0;
      profit += (s.total - cost);
    });
    return { type: 'result', resultType: 'profit', profit };
  },

  async _continuePending(answerText) {
    const p = this.pending;

    if (p.missing === 'ITEM_RESOLVE') {
      const items = await DB.getAll('items');
      const match = Normalize.bestMatch(answerText, items, { threshold: 0.4 });
      if (match) {
        p.cmd.itemId = match.entity.id;
        p.cmd.itemName = match.entity.name;
        if (!p.cmd.qty) p.cmd.qty = this._extractQtyForItem(p.cmd._rawText || '', match.entity);
        this.pending = null;
        return await this._resumeAfterItemResolved(p.cmd);
      }
      const newItem = { id: DB.uid(), name: p.itemPhrase, aliases: [], stock: 0, buyPrice: 0, sellPrice: 0, minStock: 0, customFields: [], createdAt: Date.now() };
      await DB.put('items', newItem);
      await DB.addTimeline({ refType: 'item', refId: newItem.id, action: 'create', text: `created ${newItem.name}`, meta: {} });
      p.cmd.itemId = newItem.id; p.cmd.itemName = newItem.name;
      if (!p.cmd.qty) p.cmd.qty = this._extractQtyForItem(p.cmd._rawText || '', newItem);
      this.pending = null;
      return await this._resumeAfterItemResolved(p.cmd);
    }

    if (p.missing === 'qty') {
      const item = await DB.get('items', p.cmd.itemId);
      p.cmd.qty = this._extractQtyForItem(answerText, item) ?? NLU.extractNumbers(answerText)[0];
      this.pending = null;
      return await this._resumeCommand(p.cmd);
    }
    if (p.missing === 'price') {
      p.cmd.price = NLU.extractPrice(answerText) ?? NLU.extractNumbers(answerText)[0];
      this.pending = null;
      return await this._resumeCommand(p.cmd);
    }
    if (p.missing === 'payment') {
      p.cmd.payment = NLU.extractPayment(answerText) || 'cash';
      this.pending = null;
      return await this._resumeCommand(p.cmd);
    }
    if (p.missing === 'invoiceNumber') {
      const num = NLU.extractInvoiceNumber(answerText);
      this.pending = null;
      if (!num) return { type: 'unknown' };
      return await this._buildDeleteInvoiceCommand(p.cmd, answerText);
    }
    if (p.missing === 'customerName') {
      p.cmd.customerName = answerText.trim();
      this.pending = null;
      return await this._resumeCommand(p.cmd);
    }
    if (p.missing === 'customerPhone') {
      p.cmd.customerPhone = NLU.extractPhone(answerText) || answerText.trim();
      this.pending = null;
      return await this._resumeCommand(p.cmd);
    }
    if (p.missing === 'partyName') {
      const store = p.cmd.store;
      const party = { id: DB.uid(), name: answerText.trim(), phone: '', address: '', balance: 0, createdAt: Date.now() };
      await DB.put(store, party);
      this.pending = null;
      return { type: 'confirm', messageKey: store === 'customers' ? 'confirmNewCustomer' : 'confirmNewSupplier', party };
    }

    this.pending = null;
    return { type: 'unknown' };
  },

  async _resumeAfterItemResolved(cmd) {
    if (cmd.op === 'SALE' || cmd.op === 'PURCHASE' || cmd.op === 'RETURN') return await this._fillMissingInvoiceSlots(cmd);
    if (cmd.op === 'STOCK_INC' || cmd.op === 'STOCK_DEC') {
      if (!cmd.qty) { this.pending = { cmd, missing: 'qty' }; return { type: 'ask', field: 'askQty' }; }
      return await this._executeStockChange(cmd);
    }
    if (cmd.op === 'PRICE_CHANGE') {
      if (!cmd.price) { this.pending = { cmd, missing: 'price' }; return { type: 'ask', field: 'askPrice' }; }
      return await this._executePriceChange(cmd);
    }
    return { type: 'unknown' };
  },

  async _resumeCommand(cmd) {
    if (cmd.op === 'SALE' || cmd.op === 'PURCHASE' || cmd.op === 'RETURN') return await this._fillMissingInvoiceSlots(cmd);
    if (cmd.op === 'STOCK_INC' || cmd.op === 'STOCK_DEC') return await this._executeStockChange(cmd);
    if (cmd.op === 'PRICE_CHANGE') return await this._executePriceChange(cmd);
    return { type: 'unknown' };
  },

  cancelPending() { this.pending = null; },

  async forceCreateItem() {
    const p = this.pending;
    if (!p || p.missing !== 'ITEM_RESOLVE') return { type: 'unknown' };
    const newItem = { id: DB.uid(), name: p.itemPhrase, aliases: [], stock: 0, buyPrice: 0, sellPrice: 0, minStock: 0, customFields: [], createdAt: Date.now() };
    await DB.put('items', newItem);
    await DB.addTimeline({ refType: 'item', refId: newItem.id, action: 'create', text: `created ${newItem.name}`, meta: {} });
    p.cmd.itemId = newItem.id; p.cmd.itemName = newItem.name;
    if (!p.cmd.qty) p.cmd.qty = this._extractQtyForItem(p.cmd._rawText || '', newItem);
    this.pending = null;
    return await this._resumeAfterItemResolved(p.cmd);
  },

  async autocomplete(text) {
    if (!text || text.length < 1) return [];
    const [items, customers, suppliers] = await Promise.all([
      DB.getAll('items'), DB.getAll('customers'), DB.getAll('suppliers')
    ]);
    const all = [
      ...items.map(i => ({ ...i, _type: 'item' })),
      ...customers.map(i => ({ ...i, _type: 'customer' })),
      ...suppliers.map(i => ({ ...i, _type: 'supplier' })),
    ];
    let results = Normalize.smartSearch(text, all, { threshold: 0.25, limit: 6 });
    if (!results.length) {
      const lastWord = text.split(/\s+/).pop();
      if (lastWord && lastWord.length >= 2) {
        results = Normalize.smartSearch(lastWord, all, { threshold: 0.25, limit: 6 });
      }
    }
    return results.map(r => r.entity);
  }
};

</script>
<script>
/* =========================================================
   UI.js — کمک‌توابع عمومی رابط کاربری: مودال، toast، جدول‌ساز
   ========================================================= */

const UI = {
  toast(msg, type = '') {
    const box = document.getElementById('toastBox');
    const el = document.createElement('div');
    el.className = `toast ${type}`;
    el.textContent = msg;
    box.appendChild(el);
    setTimeout(() => el.remove(), 3200);
  },

  openModal(html) {
    document.getElementById('modalBox').innerHTML = html;
    document.getElementById('modalOverlay').classList.remove('hidden');
  },

  closeModal() {
    document.getElementById('modalOverlay').classList.add('hidden');
    document.getElementById('modalBox').innerHTML = '';
  },

  escapeHtml(s) {
    return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  },

  renderTable(container, columns, rows, opts = {}) {
    if (!rows.length) {
      container.innerHTML = `<div style="padding:24px;text-align:center;color:var(--text-dim);">${I18n.t('common.noData')}</div>`;
      return;
    }
    let html = '<table><thead><tr>';
    columns.forEach(c => html += `<th>${UI.escapeHtml(c.label)}</th>`);
    html += `<th>${I18n.t('common.actions')}</th></tr></thead><tbody>`;
    rows.forEach(row => {
      html += `<tr data-id="${row.id}">`;
      columns.forEach(c => {
        let val = typeof c.render === 'function' ? c.render(row) : row[c.key];
        html += `<td>${val ?? ''}</td>`;
      });
      html += `<td class="row-actions">
        <button class="link-btn act-history" data-id="${row.id}">${I18n.t('common.history')}</button>
        <button class="link-btn act-edit" data-id="${row.id}">${I18n.t('common.edit')}</button>
        <button class="link-btn act-delete" data-id="${row.id}" style="color:var(--red)">${I18n.t('common.delete')}</button>
      </tr>`;
    });
    html += '</tbody></table>';
    container.innerHTML = html;
  }
};

</script>
<script>
/* =========================================================
   App.js — بوت‌استرپ اصلی، ناوبری بین ماژول‌ها، رندر صفحات
   ========================================================= */

const App = {
  currentView: 'chat',

  async init() {
    await DB.open();
    await I18n.setLanguage('fa');
    this.showApp();

    this.bindNav();
    this.bindSettings();
    this.bindChat();
    this.bindModuleToolbars();
    window.addEventListener('langchange', () => this.onLangChange());
  },

  showApp() {
    document.getElementById('app').classList.remove('hidden');
    this.renderChatWelcome();
    this.switchView('chat');
  },

  onLangChange() {
    document.getElementById('viewTitle').textContent = I18n.t(`nav.${this.currentView}`);
    this.renderCurrentView();
    this.renderChatHints();
    document.getElementById('currencyInput').value = I18n.meta().currency || '';
  },

  bindNav() {
    document.querySelectorAll('.nav-item, .bn-item').forEach(el => {
      el.addEventListener('click', () => this.switchView(el.dataset.view));
    });
    document.getElementById('menuBtn').addEventListener('click', () => {
      document.getElementById('sidebar').classList.toggle('show');
    });
  },

  switchView(view) {
    this.currentView = view;
    document.querySelectorAll('.nav-item, .bn-item').forEach(el => {
      el.classList.toggle('active', el.dataset.view === view);
    });
    document.querySelectorAll('.view').forEach(el => el.classList.remove('active'));
    document.getElementById(`view-${view}`)?.classList.add('active');
    document.getElementById('viewTitle').textContent = I18n.t(`nav.${view}`);
    this.renderCurrentView();
  },

  renderCurrentView() {
    const map = {
      dashboard: () => this.renderDashboard(),
      items: () => this.renderItems(),
      customers: () => this.renderCustomers(),
      suppliers: () => this.renderSuppliers(),
      purchaseInvoices: () => this.renderInvoices('purchaseInvoices', 'purchaseInvoicesTable'),
      salesInvoices: () => this.renderInvoices('salesInvoices', 'salesInvoicesTable'),
      reports: () => this.renderReports(),
    };
    if (map[this.currentView]) map[this.currentView]();
  },

  async renderDashboard() {
    const [sales, purchases, items] = await Promise.all([
      DB.getAll('salesInvoices'), DB.getAll('purchaseInvoices'), DB.getAll('items')
    ]);
    const startOfDay = new Date(); startOfDay.setHours(0,0,0,0);
    const todaySales = sales.filter(s => s.date >= startOfDay.getTime()).reduce((a,s)=>a+s.total,0);
    const todayPurchases = purchases.filter(s => s.date >= startOfDay.getTime()).reduce((a,s)=>a+s.total,0);
    const profitResult = await CommandEngine._queryProfit();

    const cards = document.getElementById('dashboardCards');
    cards.innerHTML = `
      <div class="stat-card"><div class="label">${I18n.t('dashboard.todaySales')}</div><div class="value">${I18n.formatCurrency(todaySales)}</div></div>
      <div class="stat-card"><div class="label">${I18n.t('dashboard.todayPurchases')}</div><div class="value">${I18n.formatCurrency(todayPurchases)}</div></div>
      <div class="stat-card"><div class="label">${I18n.t('dashboard.monthProfit')}</div><div class="value">${I18n.formatCurrency(profitResult.profit)}</div></div>
      <div class="stat-card"><div class="label">${I18n.t('dashboard.totalItems')}</div><div class="value">${items.length}</div></div>
    `;
    const low = items.filter(i => (i.stock ?? 0) <= (i.minStock ?? 0));
    const list = document.getElementById('lowStockList');
    list.innerHTML = low.length ? low.map(i => {
      let extra = i.customFields && i.customFields.length ? ' (' + i.customFields.map(f => f && f.label ? `${f.label}: ${f.value}` : '').filter(Boolean).join('، ') + ')' : '';
      return `<div class="timeline-item">${UI.escapeHtml(i.name)}${extra} — <span class="low-stock">${this.formatItemQty(i, i.stock)}</span> / ${I18n.t('item.minStock')}: ${this.formatItemQty(i, i.minStock)}</div>`;
    }).join('') : `<div style="color:var(--text-dim)">${I18n.t('common.noData')}</div>`;
  },

  async renderReports() {
    const [sales, purchases] = await Promise.all([DB.getAll('salesInvoices'), DB.getAll('purchaseInvoices')]);
    const profitResult = await CommandEngine._queryProfit();
    const totalSales = sales.reduce((a,s)=>a+s.total,0);
    const totalPurchases = purchases.reduce((a,s)=>a+s.total,0);
    document.getElementById('reportCards').innerHTML = `
      <div class="stat-card"><div class="label">${I18n.t('reports.totalSales')}</div><div class="value">${I18n.formatCurrency(totalSales)}</div></div>
      <div class="stat-card"><div class="label">${I18n.t('reports.totalPurchases')}</div><div class="value">${I18n.formatCurrency(totalPurchases)}</div></div>
      <div class="stat-card"><div class="label">${I18n.t('reports.totalProfit')}</div><div class="value">${I18n.formatCurrency(profitResult.profit)}</div></div>
    `;
    const recent = await DB.getRecentTimeline(30);
    document.getElementById('recentActivity').innerHTML = recent.length ? recent.map(t => `
      <div class="timeline-item"><div class="t-date">${I18n.formatDate(t.ts)}</div>${UI.escapeHtml(t.text)}</div>
    `).join('') : `<div style="color:var(--text-dim)">${I18n.t('common.noData')}</div>`;
  },

  async renderItems(filter = '') {
    let items = await DB.getAll('items');
    if (filter) items = items.filter(i => Normalize.key(i.name).includes(Normalize.key(filter)));
    const cols = [
      { key: 'name', label: I18n.t('item.name'), render: r => {
          let extra = '';
          if (r.customFields && r.customFields.length) {
            extra = `<div style="font-size:11px; color:var(--text-dim); margin-top:2px;">` +
                    r.customFields.map(f => f && f.label ? `${UI.escapeHtml(f.label)}: ${UI.escapeHtml(f.value)}` : '').filter(Boolean).join(' | ') +
                    `</div>`;
          }
          return `<div><strong>${UI.escapeHtml(r.name)}</strong>${extra}</div>`;
        }
      },
      { key: 'category', label: I18n.t('item.category') },
      { key: 'unitType', label: I18n.t('item.unitType'), render: r => r.weightBased ? I18n.t('item.unitWeight') : I18n.t('item.unitCount') },
      { key: 'buyPrice', label: I18n.t('item.buyPrice'), render: r => I18n.formatCurrency(r.buyPrice) + (r.weightBased ? ` / ${I18n.t('unit.kg')}` : '') },
      { key: 'sellPrice', label: I18n.t('item.sellPrice'), render: r => I18n.formatCurrency(r.sellPrice) + (r.weightBased ? ` / ${I18n.t('unit.kg')}` : '') },
      { key: 'stock', label: I18n.t('item.stock'), render: r => `<span class="${(r.stock<=r.minStock)?'low-stock':''}">${this.formatItemQty(r, r.stock)}</span>` },
    ];
    const container = document.getElementById('itemsTable');
    UI.renderTable(container, cols, items);
    this._bindRowActions(container, 'items', (row) => this.openItemForm(row), 'item');
  },

  formatItemQty(item, rawValue) {
    const v = Number(rawValue) || 0;
    if (!item || !item.weightBased) return I18n.formatNumber(v);
    if (v >= 1000) return `${I18n.formatNumber(+(v / 1000).toFixed(2))} ${I18n.t('unit.kg')}`;
    return `${I18n.formatNumber(v)} ${I18n.t('unit.g')}`;
  },

  openItemForm(row) {
    const isEdit = !!row;
    const weightBased = !!row?.weightBased;
    const stockDisplay = weightBased ? (row.stock || 0) / 1000 : (row?.stock || 0);
    const minDisplay = weightBased ? (row.minStock || 0) / 1000 : (row?.minStock || 0);
    
    let fields = row?.customFields ? JSON.parse(JSON.stringify(row.customFields)) : [];

    UI.openModal(`
      <h3>${isEdit ? I18n.t('common.edit') : I18n.t('common.add')} — ${I18n.t('item.singular')}</h3>
      <div class="form-row"><label>${I18n.t('item.name')}</label><input id="f_name" value="${UI.escapeHtml(row?.name||'')}"></div>
      <div class="form-row"><label>${I18n.t('item.aliases')}</label><input id="f_aliases" value="${UI.escapeHtml((row?.aliases||[]).join(', '))}" placeholder="comma,separated"></div>
      <div class="form-row"><label>${I18n.t('item.category')}</label><input id="f_category" value="${UI.escapeHtml(row?.category||'')}"></div>
      <div class="form-row">
        <label>${I18n.t('item.unitType')}</label>
        <select id="f_unittype">
          <option value="count" ${!weightBased ? 'selected' : ''}>${I18n.t('item.unitCount')}</option>
          <option value="weight" ${weightBased ? 'selected' : ''}>${I18n.t('item.unitWeight')}</option>
        </select>
      </div>
      <div class="form-row"><label id="lbl_buy">${I18n.t('item.buyPrice')}${weightBased ? ` (${I18n.t('unit.kg')})` : ''}</label><input id="f_buy" type="number" step="any" value="${row?.buyPrice||0}"></div>
      <div class="form-row"><label id="lbl_sell">${I18n.t('item.sellPrice')}${weightBased ? ` (${I18n.t('unit.kg')})` : ''}</label><input id="f_sell" type="number" step="any" value="${row?.sellPrice||0}"></div>
      <div class="form-row"><label id="lbl_stock">${I18n.t('item.stock')}${weightBased ? ` (${I18n.t('unit.kg')})` : ''}</label><input id="f_stock" type="number" step="any" value="${stockDisplay}"></div>
      <div class="form-row"><label id="lbl_min">${I18n.t('item.minStock')}${weightBased ? ` (${I18n.t('unit.kg')})` : ''}</label><input id="f_min" type="number" step="any" value="${minDisplay}"></div>
      <div class="form-row"><label>${I18n.t('item.description')}</label><textarea id="f_desc">${UI.escapeHtml(row?.description||'')}</textarea></div>
      
      <div class="panel" style="margin-top:14px; padding:12px; background: rgba(255,255,255,0.02); border: 1px solid var(--border-soft);">
        <h4 style="margin:0 0 10px 0; font-size:13px; display:flex; justify-content:space-between; align-items:center;">
          <span>فیلدهای اطلاعاتی دلخواه</span>
          <button type="button" class="btn" id="addCustomFieldBtn" style="padding:4px 10px; font-size:11px;">+ افزودن فیلد جدید</button>
        </h4>
        <div id="customFieldsContainer" style="display:flex; flex-direction:column; gap:8px;"></div>
      </div>

      <div class="modal-actions">
        <button class="btn" id="cancelBtn">${I18n.t('common.cancel')}</button>
        <button class="btn primary" id="saveBtn">${I18n.t('common.save')}</button>
      </div>
    `);

    const unitSelect = document.getElementById('f_unittype');
    const refreshLabels = () => {
      const isWeight = unitSelect.value === 'weight';
      const kgSuffix = ` (${I18n.t('unit.kg')})`;
      document.getElementById('lbl_buy').textContent = I18n.t('item.buyPrice') + (isWeight ? kgSuffix : '');
      document.getElementById('lbl_sell').textContent = I18n.t('item.sellPrice') + (isWeight ? kgSuffix : '');
      document.getElementById('lbl_stock').textContent = I18n.t('item.stock') + (isWeight ? kgSuffix : '');
      document.getElementById('lbl_min').textContent = I18n.t('item.minStock') + (isWeight ? kgSuffix : '');
    };
    unitSelect.onchange = refreshLabels;

    const renderCustomFields = () => {
      const container = document.getElementById('customFieldsContainer');
      container.innerHTML = '';
      fields.forEach((field, index) => {
        const div = document.createElement('div');
        div.style.display = 'flex';
        div.style.gap = '8px';
        div.style.alignItems = 'center';
        div.innerHTML = `
          <input type="text" placeholder="عنوان فیلد (مثلاً رنگ)" class="text-input" style="flex:1; padding:8px 12px; font-size:12px; min-width:unset;" value="${UI.escapeHtml(field.label)}" data-idx="${index}" data-prop="label">
          <input type="text" placeholder="مقدار (مثلاً قرمز)" class="text-input" style="flex:1; padding:8px 12px; font-size:12px; min-width:unset;" value="${UI.escapeHtml(field.value)}" data-idx="${index}" data-prop="value">
          <button class="btn danger btn-del-cf" data-idx="${index}" style="padding:8px 12px; font-size:12px; margin:0; flex-shrink:0;">حذف</button>
        `;
        container.appendChild(div);
      });

      container.querySelectorAll('input').forEach(input => {
        input.addEventListener('input', (e) => {
          const idx = parseInt(e.target.dataset.idx);
          const prop = e.target.dataset.prop;
          fields[idx][prop] = e.target.value;
        });
      });

      container.querySelectorAll('.btn-del-cf').forEach(btn => {
        btn.onclick = (e) => {
          e.preventDefault();
          const idx = parseInt(btn.dataset.idx);
          fields.splice(idx, 1);
          renderCustomFields();
        };
      });
    };

    document.getElementById('addCustomFieldBtn').onclick = (e) => {
      e.preventDefault();
      fields.push({ label: '', value: '' });
      renderCustomFields();
    };

    renderCustomFields();

    document.getElementById('cancelBtn').onclick = () => UI.closeModal();
    document.getElementById('saveBtn').onclick = async () => {
      const item = row || { id: DB.uid(), createdAt: Date.now() };
      item.name = document.getElementById('f_name').value.trim();
      item.aliases = document.getElementById('f_aliases').value.split(',').map(s=>s.trim()).filter(Boolean);
      item.category = document.getElementById('f_category').value.trim();
      item.weightBased = document.getElementById('f_unittype').value === 'weight';
      item.buyPrice = parseFloat(document.getElementById('f_buy').value) || 0;
      item.sellPrice = parseFloat(document.getElementById('f_sell').value) || 0;
      const stockInput = parseFloat(document.getElementById('f_stock').value) || 0;
      const minInput = parseFloat(document.getElementById('f_min').value) || 0;
      item.stock = item.weightBased ? stockInput * 1000 : stockInput;
      item.minStock = item.weightBased ? minInput * 1000 : minInput;
      item.description = document.getElementById('f_desc').value.trim();
      
      item.customFields = fields.filter(f => f && ((f.label && f.label.trim()) || (f.value && f.value.trim())));

      if (!item.name) { UI.toast(I18n.t('common.required'), 'error'); return; }
      await DB.put('items', item);
      await DB.addTimeline({ refType:'item', refId:item.id, action: row?'edit':'create', text:`${row?'edit':'create'} ${item.name}`, meta:{} });
      UI.closeModal(); UI.toast(I18n.t('common.save'), 'success');
      this.renderItems();
    };
  },

  async renderCustomers(filter = '') { return this._renderParty('customers', 'customersTable', filter); },
  async renderSuppliers(filter = '') { return this._renderParty('suppliers', 'suppliersTable', filter); },

  async _renderParty(store, tableId, filter) {
    let rows = await DB.getAll(store);
    if (filter) rows = rows.filter(r => Normalize.key(r.name).includes(Normalize.key(filter)));
    const label = store === 'customers' ? 'customer' : 'supplier';
    const cols = [
      { key: 'name', label: I18n.t('common.name') },
      { key: 'phone', label: I18n.t(`${label}.phone`) },
      { key: 'address', label: I18n.t(`${label}.address`) },
      { key: 'balance', label: I18n.t(`${label}.balance`), render: r => I18n.formatCurrency(r.balance||0) },
    ];
    const container = document.getElementById(tableId);
    UI.renderTable(container, cols, rows);
    this._bindRowActions(container, store, (row) => this.openPartyForm(store, row), label === 'customer' ? 'customer' : 'supplier');
  },

  openPartyForm(store, row) {
    const label = store === 'customers' ? 'customer' : 'supplier';
    UI.openModal(`
      <h3>${row ? I18n.t('common.edit') : I18n.t('common.add')} — ${I18n.t(`${label}.singular`)}</h3>
      <div class="form-row"><label>${I18n.t('common.name')}</label><input id="f_name" value="${UI.escapeHtml(row?.name||'')}"></div>
      <div class="form-row"><label>${I18n.t(`${label}.phone`)}</label><input id="f_phone" value="${UI.escapeHtml(row?.phone||'')}"></div>
      <div class="form-row"><label>${I18n.t(`${label}.address`)}</label><input id="f_address" value="${UI.escapeHtml(row?.address||'')}"></div>
      <div class="modal-actions">
        <button class="btn" id="cancelBtn">${I18n.t('common.cancel')}</button>
        <button class="btn primary" id="saveBtn">${I18n.t('common.save')}</button>
      </div>
    `);
    document.getElementById('cancelBtn').onclick = () => UI.closeModal();
    document.getElementById('saveBtn').onclick = async () => {
      const party = row || { id: DB.uid(), balance: 0, createdAt: Date.now() };
      party.name = document.getElementById('f_name').value.trim();
      party.phone = document.getElementById('f_phone').value.trim();
      party.address = document.getElementById('f_address').value.trim();
      if (!party.name) { UI.toast(I18n.t('common.required'), 'error'); return; }
      await DB.put(store, party);
      UI.closeModal(); UI.toast(I18n.t('common.save'), 'success');
      store === 'customers' ? this.renderCustomers() : this.renderSuppliers();
    };
  },

  async renderInvoices(store, tableId) {
    const rows = (await DB.getAll(store)).sort((a,b) => b.date - a.date);
    const items = await DB.getAll('items');
    const itemMap = Object.fromEntries(items.map(i => [i.id, i]));
    const cols = [
      { key: 'number', label: I18n.t('invoice.number') },
      { key: 'itemName', label: I18n.t('item.singular'), render: r => {
          const item = itemMap[r.itemId];
          let extra = '';
          if (item && item.customFields && item.customFields.length) {
            extra = `<div style="font-size:11px; color:var(--text-dim); margin-top:2px;">` +
                    item.customFields.map(f => f && f.label ? `${UI.escapeHtml(f.label)}: ${UI.escapeHtml(f.value)}` : '').filter(Boolean).join(' | ') +
                    `</div>`;
          }
          return `<div><strong>${UI.escapeHtml(r.itemName)}</strong>${extra}</div>`;
        }
      },
      { key: 'qty', label: 'تعداد', render: r => this.formatItemQty(itemMap[r.itemId], r.qty) },
      { key: 'total', label: I18n.t('invoice.total'), render: r => I18n.formatCurrency(r.total) },
      { key: 'payment', label: I18n.t('invoice.payment') },
      { key: 'date', label: I18n.t('invoice.date'), render: r => I18n.formatDate(r.date) },
    ];
    const container = document.getElementById(tableId);
    UI.renderTable(container, cols, rows);
    container.querySelectorAll('.act-edit').forEach(b => b.style.display = 'none');
    container.querySelectorAll('.act-history').forEach(b => b.style.display = 'none');
    if (store === 'salesInvoices') {
      container.querySelectorAll('tr[data-id]').forEach(tr => {
        const id = tr.dataset.id;
        const inv = rows.find(r => r.id === id);
        const actionsTd = tr.querySelector('.row-actions');
        if (actionsTd && inv) {
          const btn = document.createElement('button');
          btn.className = 'link-btn';
          btn.textContent = I18n.t('common.print');
          btn.onclick = () => this.printInvoice(inv);
          actionsTd.insertBefore(btn, actionsTd.firstChild);
        }
      });
    }
    container.querySelectorAll('.act-delete').forEach(btn => {
      btn.onclick = async () => {
        if (!confirm(I18n.t('common.confirmDelete'))) return;
        const inv = rows.find(r => r.id === btn.dataset.id);
        const item = await DB.get('items', inv.itemId);
        if (item) { item.stock += (store === 'salesInvoices') ? inv.qty : -inv.qty; await DB.put('items', item); }
        await DB.delete(store, inv.id);
        this.renderInvoices(store, tableId);
        UI.toast(I18n.t('chat.confirmDeleteInvoice'), 'success');
      };
    });
  },

  _bindRowActions(container, store, onEdit, refType) {
    container.querySelectorAll('.act-edit').forEach(btn => {
      btn.onclick = async () => { const row = await DB.get(store, btn.dataset.id); onEdit(row); };
    });
    container.querySelectorAll('.act-delete').forEach(btn => {
      btn.onclick = async () => {
        if (!confirm(I18n.t('common.confirmDelete'))) return;
        await DB.delete(store, btn.dataset.id);
        UI.toast(I18n.t('common.delete'), 'success');
        this.renderCurrentView();
      };
    });
    container.querySelectorAll('.act-history').forEach(btn => {
      btn.onclick = async () => {
        const timeline = await DB.getTimelineFor(refType, btn.dataset.id);
        UI.openModal(`
          <h3>${I18n.t('common.history')}</h3>
          <div class="timeline">${timeline.length ? timeline.map(t => `
            <div class="timeline-item"><div class="t-date">${I18n.formatDate(t.ts)}</div>${UI.escapeHtml(t.text)}</div>
          `).join('') : `<div style="color:var(--text-dim)">${I18n.t('common.noData')}</div>`}</div>
          <div class="modal-actions"><button class="btn" id="closeBtn">${I18n.t('common.close')}</button></div>
        `);
        document.getElementById('closeBtn').onclick = () => UI.closeModal();
      };
    });
  },

  bindModuleToolbars() {
    document.getElementById('addItemBtn').onclick = () => this.openItemForm(null);
    document.getElementById('addCustomerBtn').onclick = () => this.openPartyForm('customers', null);
    document.getElementById('addSupplierBtn').onclick = () => this.openPartyForm('suppliers', null);
    document.getElementById('itemSearch').oninput = (e) => this.renderItems(e.target.value);
    document.getElementById('customerSearch').oninput = (e) => this.renderCustomers(e.target.value);
    document.getElementById('supplierSearch').oninput = (e) => this.renderSuppliers(e.target.value);
    document.getElementById('modalOverlay').addEventListener('click', (e) => { if (e.target.id === 'modalOverlay') UI.closeModal(); });
  },

  bindSettings() {
    document.getElementById('exportBtn').onclick = async () => {
      const dump = await DB.exportAll();
      const blob = new Blob([JSON.stringify(dump, null, 2)], { type: 'application/json' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = `bizflow-backup-${Date.now()}.json`;
      a.click();
    };
    document.getElementById('importBtn').onclick = () => document.getElementById('importFile').click();
    document.getElementById('importFile').onchange = async (e) => {
      const file = e.target.files[0]; if (!file) return;
      const text = await file.text();
      try {
        const dump = JSON.parse(text);
        await DB.importAll(dump);
        UI.toast(I18n.t('settings.import'), 'success');
        this.renderCurrentView();
      } catch (err) { UI.toast('Error', 'error'); }
    };
    document.getElementById('resetBtn').onclick = async () => {
      if (!confirm(I18n.t('common.confirmDelete'))) return;
      await DB.clearAll();
      UI.toast(I18n.t('settings.reset'), 'success');
      this.renderCurrentView();
    };
    document.getElementById('currencyInput').addEventListener('change', (e) => {
      if (I18n.dict.meta) I18n.dict.meta.currencySymbol = e.target.value;
    });
  },

  async printInvoice(invoice) {
    const dir = I18n.meta().dir || 'ltr';
    const paymentText = invoice.payment || '-';
    const item = await DB.get('items', invoice.itemId);
    const qtyLabel = item ? this.formatItemQty(item, invoice.qty) : invoice.qty;
    const unitPriceLabel = item?.weightBased ? ` / ${I18n.t('unit.kg')}` : '';
    const qtyForPrice = item?.weightBased ? invoice.qty / 1000 : invoice.qty;
    const lineSubtotal = invoice.price * qtyForPrice;

    let customFieldsHtml = '';
    if (item && item.customFields && item.customFields.length) {
      customFieldsHtml = `<div style="font-size:11px; color:#555; margin-top:4px;">`;
      item.customFields.forEach(f => {
        if (f && f.label && f.value) {
          customFieldsHtml += `<span style="margin-inline-end: 12px;"><strong>${UI.escapeHtml(f.label)}:</strong> ${UI.escapeHtml(f.value)}</span>`;
        }
      });
      customFieldsHtml += `</div>`;
    }

    const html = `
      <div class="print-invoice" dir="${dir}">
        <div class="pi-header">
          <div class="pi-brand">BizFlow</div>
          <div class="pi-title">${UI.escapeHtml(I18n.t('invoice.sale'))}</div>
        </div>
        <div class="pi-row"><span>${I18n.t('invoice.number')}</span><span>#${invoice.number}</span></div>
        <div class="pi-row"><span>${I18n.t('invoice.date')}</span><span>${I18n.formatDate(invoice.date)}</span></div>
        <div class="pi-row"><span>${I18n.t('customer.singular')}</span><span>${UI.escapeHtml(invoice.customerName || '-')}</span></div>
        <div class="pi-row"><span>${I18n.t('customer.phone')}</span><span>${UI.escapeHtml(invoice.customerPhone || '-')}</span></div>
        <table class="pi-table">
          <thead><tr>
            <th>${I18n.t('item.singular')}</th>
            <th>تعداد</th>
            <th>${I18n.t('item.sellPrice')}</th>
            <th>${I18n.t('invoice.total')}</th>
          </tr></thead>
          <tbody><tr>
            <td>
              <div><strong>${UI.escapeHtml(invoice.itemName)}</strong></div>
              ${customFieldsHtml}
            </td>
            <td>${qtyLabel}</td>
            <td>${I18n.formatCurrency(invoice.price)}${unitPriceLabel}</td>
            <td>${I18n.formatCurrency(lineSubtotal)}</td>
          </tr></tbody>
        </table>
        <div class="pi-row"><span>${I18n.t('invoice.discount')}</span><span>${I18n.formatCurrency(invoice.discount || 0)}</span></div>
        <div class="pi-row"><span>${I18n.t('invoice.tax')}</span><span>${I18n.formatCurrency(invoice.tax || 0)}</span></div>
        <div class="pi-row pi-total"><span>${I18n.t('invoice.total')}</span><span>${I18n.formatCurrency(invoice.total)}</span></div>
        <div class="pi-row"><span>${I18n.t('invoice.payment')}</span><span>${UI.escapeHtml(paymentText)}</span></div>
      </div>
    `;
    document.getElementById('printArea').innerHTML = html;
    setTimeout(() => window.print(), 60);
  },

  renderChatWelcome() {
    const box = document.getElementById('chatMessages');
    box.innerHTML = '';
    this._addBotMsg(I18n.t('chat.welcome'));
    this.renderChatHints();
  },

  renderChatHints() {
    const hints = I18n.hints();
    document.getElementById('chatHints').innerHTML = hints.map(h => `<span class="hint">${UI.escapeHtml(h)}</span>`).join('');
    document.querySelectorAll('.chat-hints .hint').forEach(h => {
      h.onclick = () => { document.getElementById('chatInput').value = h.textContent; this.sendChat(); };
    });
  },

  bindChat() {
    const input = document.getElementById('chatInput');
    document.getElementById('chatSendBtn').onclick = () => this.sendChat();
    input.addEventListener('keydown', (e) => { if (e.key === 'Enter') this.sendChat(); });
    input.addEventListener('input', async () => {
      const q = input.value;
      const box = document.getElementById('autocompleteBox');
      if (!q.trim()) { box.classList.add('hidden'); return; }
      const suggestions = await CommandEngine.autocomplete(q);
      if (!suggestions.length) { box.classList.add('hidden'); return; }
      
      box.innerHTML = suggestions.map(s => {
        let extra = '';
        let extraRaw = '';
        if (s._type === 'item' && s.customFields && s.customFields.length) {
          extra = ' (' + s.customFields.map(f => f && f.label ? `${f.label}: ${f.value}` : '').filter(Boolean).join('، ') + ')';
          extraRaw = ' ' + s.customFields.map(f => f && f.label ? `${f.label} ${f.value}` : '').filter(Boolean).join(' ');
        }
        return `<div class="ac-item" data-name="${UI.escapeHtml(s.name + extraRaw)}">
          <span>${UI.escapeHtml(s.name)}${extra ? `<span style="font-size:11px;color:var(--text-dim); margin-inline-start:4px;">${extra}</span>` : ''}</span>
          <span style="color:var(--text-dim)">${s._type}</span>
        </div>`;
      }).join('');
      box.classList.remove('hidden');

      box.querySelectorAll('.ac-item').forEach(item => {
        item.onclick = () => {
          const fullText = input.value;
          const itemName = item.getAttribute('data-name');
          if (!itemName) return;
          const words = fullText.split(/\s+/);
          
          let replaceIdx = words.length - 1;
          for (let i = words.length - 1; i >= 0; i--) {
            const sub = words.slice(i).join(' ');
            if (itemName.toLowerCase().includes(sub.toLowerCase()) || Normalize.similarity(sub, itemName) > 0.35) {
              replaceIdx = i;
            }
          }
          words.splice(replaceIdx);
          words.push(itemName);
          input.value = words.join(' ') + ' ';
          box.classList.add('hidden');
          input.focus();
        };
      });
    });
    document.addEventListener('click', (e) => {
      if (!e.target.closest('.chat-input-box')) document.getElementById('autocompleteBox').classList.add('hidden');
    });
  },

  _addUserMsg(text) {
    const box = document.getElementById('chatMessages');
    const el = document.createElement('div');
    el.className = 'msg user';
    el.textContent = text;
    box.appendChild(el);
    box.scrollTop = box.scrollHeight;
  },

  _addBotMsg(text, cls = '', chips = []) {
    const box = document.getElementById('chatMessages');
    const el = document.createElement('div');
    el.className = `msg bot ${cls}`;
    el.textContent = text;
    if (chips.length) {
      const chipsWrap = document.createElement('div');
      chipsWrap.className = 'chips';
      chips.forEach(c => {
        const chip = document.createElement('span');
        chip.className = 'chip';
        chip.textContent = c.label;
        chip.onclick = c.onClick;
        chipsWrap.appendChild(chip);
      });
      el.appendChild(chipsWrap);
    }
    box.appendChild(el);
    box.scrollTop = box.scrollHeight;
    return el;
  },

  async sendChat() {
    const input = document.getElementById('chatInput');
    const text = input.value.trim();
    if (!text) return;
    this._addUserMsg(text);
    input.value = '';
    document.getElementById('autocompleteBox').classList.add('hidden');

    const result = await CommandEngine.process(text, I18n.current);
    await this._renderChatResult(result);
  },

  async _renderChatResult(result) {
    switch (result.type) {
      case 'unknown':
        this._addBotMsg(I18n.t('chat.unknown'), 'ask');
        break;
      case 'error':
        this._addBotMsg(result.message, 'ask');
        break;
      case 'ask':
        this._addBotMsg(I18n.t(`chat.${result.field}`), 'ask', [
          { label: I18n.t('chat.cancel'), onClick: () => { CommandEngine.cancelPending(); this._addBotMsg(I18n.t('chat.cancel')); } }
        ]);
        break;
      case 'itemNotFound': {
        const chips = result.suggestions.map(s => ({
          label: s.name,
          onClick: async () => { this._addUserMsg(s.name); const r = await CommandEngine.process(s.name, I18n.current); this._renderChatResult(r); }
        }));
        chips.push({ label: I18n.t('chat.createNewItem'), onClick: async () => {
          this._addUserMsg(I18n.t('chat.createNewItem'));
          const forced = await CommandEngine.forceCreateItem();
          this._renderChatResult(forced);
        }});
        this._addBotMsg(`${I18n.t('chat.itemNotFound')} "${result.itemPhrase}"`, 'ask', chips);
        break;
      }
      case 'confirm': {
        const chips = [];
        if (result.invoice && result.invoice.type === 'SALE') {
          chips.push({ label: I18n.t('common.print'), onClick: () => this.printInvoice(result.invoice) });
        }
        let extraMsg = '';
        if (result.invoice) {
          const item = await DB.get('items', result.invoice.itemId);
          if (item && item.customFields && item.customFields.length) {
            const features = item.customFields.map(f => f && f.label ? `${f.label}: ${f.value}` : '').filter(Boolean).join(' | ');
            if (features) {
              extraMsg = `\n(${features})`;
            }
          }
        }
        this._addBotMsg(I18n.t(`chat.${result.messageKey}`) + extraMsg, 'confirm', chips);
        this.renderCurrentView();
        break;
      }
      case 'result':
        this._renderQueryResult(result);
        break;
    }
  },

  _renderQueryResult(result) {
    if (result.resultType === 'stock') {
      let customText = '';
      if (result.item.customFields && result.item.customFields.length) {
        customText = ' (' + result.item.customFields.map(f => f && f.label ? `${f.label}: ${f.value}` : '').filter(Boolean).join('، ') + ')';
      }
      this._addBotMsg(`${result.item.name}${customText}: ${this.formatItemQty(result.item, result.item.stock)} ${I18n.t('item.stock')}`, 'confirm');
    } else if (result.resultType === 'sales') {
      this._addBotMsg(`${I18n.t('dashboard.todaySales')}: ${I18n.formatCurrency(result.total)} (${result.count})`, 'confirm');
    } else if (result.resultType === 'profit') {
      this._addBotMsg(`${I18n.t('dashboard.monthProfit')}: ${I18n.formatCurrency(result.profit)}`, 'confirm');
    }
  }
};

document.addEventListener('DOMContentLoaded', () => App.init());

window.addEventListener('online', () => {
  const b = document.getElementById('onlineBadge');
  if (b) { b.textContent = I18n.t('common.online'); b.className = 'badge badge-online'; }
});
window.addEventListener('offline', () => {
  const b = document.getElementById('onlineBadge');
  if (b) { b.textContent = I18n.t('common.offline'); b.className = 'badge badge-offline'; }
});

</script>
</body>
</html>
