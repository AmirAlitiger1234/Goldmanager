<!DOCTYPE html>
<html lang="fa" dir="rtl" id="htmlRoot">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#0a0e1a">
<title>BizFlow — مدیریت هوشمند کسب‌وکار</title>
<style>
:root{
  --bg:#0a0e1a; --bg2:#0f1526; --panel:#141c30; --panel2:#1b2540;
  --panel-hover:#212c4a;
  --border:rgba(255,255,255,.07); --border-soft:rgba(255,255,255,.04);
  --text:#eef1f8; --text-dim:#8792ac; --text-dimmer:#5c6784;
  --accent:#7c6cf6; --accent2:#22d3ee;
  --accent-grad: linear-gradient(135deg, #8b5cf6 0%, #6366f1 45%, #22d3ee 100%);
  --accent-grad-soft: linear-gradient(135deg, rgba(139,92,246,.16), rgba(34,211,238,.10));
  --green:#34d399; --red:#fb7185; --amber:#fbbf24;
  --radius:16px; --radius-sm:10px; --sidebar-w:258px;
  --font: 'Vazirmatn', 'Segoe UI', Tahoma, sans-serif;
  --shadow-lift: 0 10px 30px -10px rgba(0,0,0,.55);
  --shadow-glow: 0 0 0 1px rgba(139,92,246,.25), 0 8px 24px -6px rgba(124,108,246,.35);
}
*{box-sizing:border-box;}
html,body{height:100%;margin:0;}
body{
  background:
    radial-gradient(1100px 700px at 88% -8%, rgba(124,108,246,.16), transparent 55%),
    radial-gradient(900px 600px at -5% 105%, rgba(34,211,238,.10), transparent 55%),
    var(--bg);
  color:var(--text); font-family:var(--font);
  -webkit-tap-highlight-color:transparent; overscroll-behavior:none;
  -webkit-font-smoothing:antialiased;
}
.hidden{display:none !important;}
button{font-family:inherit; cursor:pointer;}
input,select,textarea{font-family:inherit;}
::selection{background:rgba(124,108,246,.35);}

/* اسکرول‌بار سفارشی */
::-webkit-scrollbar{width:8px; height:8px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.12); border-radius:20px;}
::-webkit-scrollbar-thumb:hover{background:rgba(255,255,255,.2);}

@keyframes fadeUp{ from{opacity:0; transform:translateY(6px);} to{opacity:1; transform:translateY(0);} }
@keyframes popIn{ from{opacity:0; transform:scale(.96);} to{opacity:1; transform:scale(1);} }
@keyframes shimmer{ 0%{background-position:0% 50%;} 100%{background-position:200% 50%;} }
@media (prefers-reduced-motion: reduce){ *{animation-duration:.001s !important; transition-duration:.001s !important;} }

/* ============ لایه اصلی ============ */
.app{display:flex; height:100vh; overflow:hidden;}
.sidebar{
  width:var(--sidebar-w); background:linear-gradient(180deg, var(--bg2), var(--bg));
  border-inline-end:1px solid var(--border);
  display:flex; flex-direction:column; padding:20px 14px; flex-shrink:0;
}
.brand{display:flex; align-items:center; gap:10px; padding:2px 8px 24px; font-weight:800; font-size:19px; letter-spacing:.3px;}
.brand-logo{
  display:inline-flex; align-items:center; justify-content:center; width:34px; height:34px; border-radius:10px;
  background:var(--accent-grad); color:#fff; font-size:18px; box-shadow:var(--shadow-glow);
}
.brand-name{background:linear-gradient(90deg,#fff,#c9c3fb); -webkit-background-clip:text; background-clip:text; color:transparent;}
.nav-list{list-style:none; margin:0; padding:0; display:flex; flex-direction:column; gap:3px;}
.nav-item{
  display:flex; align-items:center; gap:11px; padding:11px 13px; border-radius:12px;
  color:var(--text-dim); font-size:14px; font-weight:500; transition:.18s; cursor:pointer; position:relative;
}
.nav-item .ic{font-size:16px; width:18px; text-align:center;}
.nav-item:hover{background:var(--panel); color:var(--text);}
.nav-item.active{background:var(--accent-grad-soft); color:#fff; box-shadow:inset 0 0 0 1px rgba(139,92,246,.35);}
.nav-item.active::before{
  content:''; position:absolute; inset-inline-start:0; top:20%; bottom:20%; width:3px; border-radius:4px;
  background:var(--accent-grad);
}

.bottom-nav{display:none;}

.main{flex:1; display:flex; flex-direction:column; min-width:0;}
.topbar{
  display:flex; align-items:center; gap:12px; padding:16px 22px; border-bottom:1px solid var(--border);
  flex-shrink:0; backdrop-filter:blur(10px); background:rgba(10,14,26,.4);
}
.topbar h2{margin:0; font-size:17px; font-weight:700; flex:1; letter-spacing:.2px;}
.icon-btn{background:none; border:none; color:var(--text); font-size:20px; padding:4px; border-radius:8px; transition:.15s;}
.icon-btn:hover{background:var(--panel);}
.only-mobile{display:none;}
.badge{font-size:11px; padding:5px 12px; border-radius:20px; font-weight:600; letter-spacing:.2px;}
.badge-offline{background:rgba(139,92,246,.16); color:#c9c3fb; box-shadow:inset 0 0 0 1px rgba(139,92,246,.3);}
.badge-online{background:rgba(52,211,153,.14); color:#6ee7b7; box-shadow:inset 0 0 0 1px rgba(52,211,153,.3);}

.views{flex:1; overflow-y:auto; padding:20px 22px 90px;}
.view{display:none;}
.view.active{display:block; animation:fadeUp .35s ease both;}

/* ============ چت ============ */
.chat-wrap{display:flex; flex-direction:column; height:calc(100vh - 130px); max-width:920px; margin:0 auto;}
.chat-messages{flex:1; overflow-y:auto; display:flex; flex-direction:column; gap:12px; padding:8px 3px 16px;}
.msg{max-width:78%; padding:12px 16px; border-radius:18px; font-size:14px; line-height:1.75; white-space:pre-wrap; animation:popIn .22s cubic-bezier(.2,.8,.2,1) both;}
.msg.user{align-self:flex-end; background:var(--accent-grad); color:#fff; border-bottom-end-radius:5px; box-shadow:0 6px 18px -6px rgba(124,108,246,.55);}
.msg.bot{align-self:flex-start; background:var(--panel); border:1px solid var(--border); border-bottom-start-radius:5px;}
.msg.bot.confirm{border-color:rgba(52,211,153,.4); box-shadow:0 0 0 1px rgba(52,211,153,.12);}
.msg.bot.ask{border-color:rgba(251,191,36,.4); box-shadow:0 0 0 1px rgba(251,191,36,.12);}
.msg .chips{display:flex; flex-wrap:wrap; gap:7px; margin-top:10px;}
.chip{background:var(--panel2); border:1px solid var(--border); border-radius:20px; padding:6px 13px; font-size:12px; color:var(--text); transition:.15s; cursor:pointer;}
.chip:hover{border-color:var(--accent); background:var(--accent-grad-soft); transform:translateY(-1px);}
.chat-input-row{display:flex; gap:10px; padding-top:10px; position:relative;}
.chat-input-box{flex:1; position:relative; border-radius:16px; padding:1.5px; background:var(--border);}
.chat-input-box:focus-within{background:var(--accent-grad); box-shadow:var(--shadow-glow);}
.chat-input-box input{
  width:100%; background:var(--panel); border:none; color:var(--text);
  padding:14px 18px; border-radius:14.5px; font-size:14px; outline:none;
}
.send-btn{
  background:var(--accent-grad); color:#fff; border:none; width:50px; border-radius:16px; font-size:17px;
  box-shadow:0 6px 18px -6px rgba(124,108,246,.6); transition:.15s;
}
.send-btn:hover{transform:translateY(-1px) scale(1.03);}
.send-btn:active{transform:scale(.96);}
.autocomplete-box{
  position:absolute; bottom:60px; left:0; right:0; background:var(--panel2); border:1px solid var(--border);
  border-radius:14px; max-height:220px; overflow-y:auto; z-index:10; box-shadow:var(--shadow-lift); backdrop-filter:blur(12px);
}
.ac-item{padding:10px 15px; font-size:13px; border-bottom:1px solid var(--border-soft); display:flex; justify-content:space-between; cursor:pointer;}
.ac-item:last-child{border-bottom:none;}
.ac-item:hover, .ac-item.sel{background:var(--panel-hover);}
.chat-hints{display:flex; flex-wrap:wrap; gap:7px; padding-top:10px;}
.chat-hints .hint{font-size:11.5px; color:var(--text-dim); background:var(--panel); border:1px solid var(--border); padding:6px 12px; border-radius:20px; cursor:pointer; transition:.15s;}
.chat-hints .hint:hover{border-color:var(--accent); color:var(--text);}

/* ============ کارت‌ها و پنل ============ */
.cards-grid{display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:14px; margin-bottom:20px;}
.stat-card{
  background:linear-gradient(160deg, var(--panel), var(--panel2)); border:1px solid var(--border); border-radius:var(--radius);
  padding:18px; position:relative; overflow:hidden; transition:.2s;
}
.stat-card::before{content:''; position:absolute; inset-inline-start:0; top:0; height:3px; width:100%; background:var(--accent-grad); opacity:.85;}
.stat-card:hover{transform:translateY(-2px); box-shadow:var(--shadow-lift);}
.stat-card .label{font-size:12px; color:var(--text-dim); margin-bottom:10px; font-weight:600;}
.stat-card .value{font-size:23px; font-weight:800; letter-spacing:.2px;}
.panel{background:linear-gradient(160deg, var(--panel), var(--panel2)); border:1px solid var(--border); border-radius:var(--radius); padding:18px; margin-bottom:16px;}
.panel h3{margin:0 0 14px; font-size:15px; font-weight:700;}

/* ============ جداول ============ */
.toolbar{display:flex; gap:10px; margin-bottom:14px; flex-wrap:wrap;}
.search-input, .text-input{
  background:var(--panel); border:1px solid var(--border); color:var(--text); padding:11px 15px;
  border-radius:12px; font-size:13px; flex:1; min-width:180px; outline:none; transition:.15s;
}
.search-input:focus, .text-input:focus{border-color:var(--accent);}
.btn{background:var(--panel2); color:var(--text); border:1px solid var(--border); padding:11px 18px; border-radius:12px; font-size:13px; font-weight:600; transition:.15s;}
.btn:hover{border-color:rgba(139,92,246,.5); transform:translateY(-1px);}
.btn.primary{background:var(--accent-grad); border-color:transparent; color:#fff; box-shadow:0 6px 16px -6px rgba(124,108,246,.6);}
.btn.danger{background:rgba(251,113,133,.14); border-color:rgba(251,113,133,.4); color:#fda4af;}
.table-wrap{overflow-x:auto; background:var(--panel); border:1px solid var(--border); border-radius:var(--radius);}
table{width:100%; border-collapse:collapse; font-size:13px;}
th,td{padding:13px 16px; text-align:start; border-bottom:1px solid var(--border-soft); white-space:nowrap;}
th{color:var(--text-dim); font-weight:700; font-size:11.5px; text-transform:uppercase; letter-spacing:.4px;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:rgba(255,255,255,.02);}
.low-stock{color:var(--red); font-weight:700;}
.link-btn{color:var(--accent2); background:none; border:none; font-size:12px; padding:5px 9px; font-weight:600; border-radius:8px; transition:.15s;}
.link-btn:hover{background:rgba(34,211,238,.12);}
.row-actions{display:flex; gap:4px;}

/* ============ مودال ============ */
.modal-overlay{
  position:fixed; inset:0; background:rgba(5,7,14,.7); backdrop-filter:blur(3px); display:flex; align-items:center; justify-content:center;
  z-index:500; padding:16px;
}
.modal{
  background:linear-gradient(165deg, var(--bg2), var(--bg)); border:1px solid var(--border); border-radius:var(--radius);
  max-width:520px; width:100%; max-height:88vh; overflow-y:auto; padding:22px; box-shadow:0 30px 80px -20px rgba(0,0,0,.7);
  animation:popIn .2s cubic-bezier(.2,.8,.2,1) both;
}
.modal h3{margin-top:0; font-weight:700;}
.form-row{margin-bottom:13px; display:flex; flex-direction:column; gap:6px;}
.form-row label{font-size:12px; color:var(--text-dim); font-weight:600;}
.form-row input, .form-row select, .form-row textarea{
  background:var(--panel); border:1px solid var(--border); color:var(--text); padding:11px 13px; border-radius:11px; font-size:13px; outline:none; transition:.15s;
}
.form-row input:focus, .form-row select:focus, .form-row textarea:focus{border-color:var(--accent);}
.modal-actions{display:flex; gap:10px; justify-content:flex-end; margin-top:18px;}
.timeline{display:flex; flex-direction:column; gap:11px; margin-top:10px;}
.timeline-item{border-inline-start:2px solid var(--accent); padding:2px 14px; font-size:12.5px;}
.timeline-item .t-date{color:var(--text-dim); font-size:11px;}

/* ============ Toast ============ */
.toast-box{position:fixed; bottom:22px; left:50%; transform:translateX(-50%); z-index:900; display:flex; flex-direction:column; gap:8px;}
[dir="rtl"] .toast-box{left:auto; right:50%; transform:translateX(50%);}
.toast{
  background:var(--panel2); border:1px solid var(--border); padding:11px 20px; border-radius:12px; font-size:13px; font-weight:600;
  box-shadow:0 10px 30px -8px rgba(0,0,0,.5); animation:fadeUp .25s ease both;
}
.toast.success{border-color:rgba(52,211,153,.5); box-shadow:0 10px 30px -8px rgba(52,211,153,.25);}
.toast.error{border-color:rgba(251,113,133,.5); box-shadow:0 10px 30px -8px rgba(251,113,133,.25);}

/* ============ موبایل ============ */
@media (max-width:860px){
  .sidebar{display:none;}
  .only-mobile{display:inline-block;}
  .bottom-nav{
    display:flex; position:fixed; bottom:0; left:0; right:0; height:62px;
    background:rgba(15,21,38,.85); backdrop-filter:blur(14px);
    border-top:1px solid var(--border); z-index:100;
  }
  .bn-item{flex:1; display:flex; align-items:center; justify-content:center; font-size:20px; color:var(--text-dim); transition:.15s; position:relative;}
  .bn-item.active{color:#fff;}
  .bn-item.active::after{content:''; position:absolute; bottom:8px; width:4px; height:4px; border-radius:50%; background:var(--accent2); box-shadow:0 0 8px var(--accent2);}
  .views{padding-bottom:80px;}
  .chat-wrap{height:calc(100vh - 190px);}
}

/* ============ فاکتور قابل چاپ ============ */
#printArea{display:none;}
.print-invoice{font-family:var(--font); color:#111; background:#fff;}
.pi-header{text-align:center; margin-bottom:18px; border-bottom:2px solid #111; padding-bottom:10px;}
.pi-brand{font-size:22px; font-weight:700;}
.pi-title{font-size:13px; color:#444; margin-top:4px;}
.pi-row{display:flex; justify-content:space-between; padding:7px 2px; border-bottom:1px dashed #bbb; font-size:13px;}
.pi-row span:first-child{color:#555;}
.pi-total{font-weight:700; font-size:15px; border-bottom:none; border-top:1px solid #111; margin-top:4px;}
.pi-table{width:100%; border-collapse:collapse; margin:16px 0;}
.pi-table th,.pi-table td{border:1px solid #999; padding:8px; font-size:13px; text-align:center;}
.pi-table th{background:#f0f0f0;}

@media print{
  body *{visibility:hidden;}
  #printArea, #printArea *{visibility:visible;}
  #printArea{
    display:block; position:absolute; top:0; left:0; width:100%;
    padding:24px;
  }
}

</style>
</head>
<body>


<!-- ===================== اپلیکیشن اصلی ===================== -->
<div id="app" class="app hidden">

  <!-- نوار کناری -->
  <nav id="sidebar" class="sidebar">
    <div class="brand">
      <span class="brand-logo">⬢</span>
      <span class="brand-name">BizFlow</span>
    </div>
    <ul class="nav-list" id="navList">
      <li data-view="chat" class="nav-item active"><span class="ic">💬</span><span data-i18n="nav.chat">چت</span></li>
      <li data-view="dashboard" class="nav-item"><span class="ic">📊</span><span data-i18n="nav.dashboard">داشبورد</span></li>
      <li data-view="items" class="nav-item"><span class="ic">📦</span><span data-i18n="nav.items">کالاها</span></li>
      <li data-view="customers" class="nav-item"><span class="ic">👤</span><span data-i18n="nav.customers">مشتریان</span></li>
      <li data-view="suppliers" class="nav-item"><span class="ic">🚚</span><span data-i18n="nav.suppliers">تأمین‌کنندگان</span></li>
      <li data-view="purchaseInvoices" class="nav-item"><span class="ic">🧾</span><span data-i18n="nav.purchaseInvoices">فاکتور خرید</span></li>
      <li data-view="salesInvoices" class="nav-item"><span class="ic">🧾</span><span data-i18n="nav.salesInvoices">فاکتور فروش</span></li>
      <li data-view="reports" class="nav-item"><span class="ic">📈</span><span data-i18n="nav.reports">گزارش‌ها</span></li>
      <li data-view="settings" class="nav-item"><span class="ic">⚙️</span><span data-i18n="nav.settings">تنظیمات</span></li>
    </ul>
  </nav>

  <!-- نوار پایینی موبایل -->
  <nav id="bottomNav" class="bottom-nav">
    <div data-view="chat" class="bn-item active"><span class="ic">💬</span></div>
    <div data-view="dashboard" class="bn-item"><span class="ic">📊</span></div>
    <div data-view="items" class="bn-item"><span class="ic">📦</span></div>
    <div data-view="reports" class="bn-item"><span class="ic">📈</span></div>
    <div data-view="settings" class="bn-item"><span class="ic">⚙️</span></div>
  </nav>

  <!-- محتوای اصلی -->
  <main class="main">
    <header class="topbar">
      <button id="menuBtn" class="icon-btn only-mobile">☰</button>
      <h2 id="viewTitle" data-i18n="nav.chat">چت</h2>
      <div class="topbar-actions">
        <span id="onlineBadge" class="badge badge-offline" data-i18n="common.offline">آفلاین</span>
      </div>
    </header>

    <div id="views" class="views">

      <!-- ---------- چت / موتور دستورات ---------- -->
      <section id="view-chat" class="view active">
        <div class="chat-wrap">
          <div id="chatMessages" class="chat-messages"></div>
          <div class="chat-input-row">
            <div class="chat-input-box">
              <input id="chatInput" type="text" data-i18n-placeholder="chat.placeholder" placeholder="مثلاً: امروز ۲ تا آیفون ۱۷ پرو فروختم" autocomplete="off">
              <div id="autocompleteBox" class="autocomplete-box hidden"></div>
            </div>
            <button id="chatSendBtn" class="send-btn">➤</button>
          </div>
          <div class="chat-hints" id="chatHints"></div>
        </div>
      </section>

      <!-- ---------- داشبورد ---------- -->
      <section id="view-dashboard" class="view">
        <div class="cards-grid" id="dashboardCards"></div>
        <div class="panel">
          <h3 data-i18n="dashboard.lowStock">کالاهای کم‌موجود</h3>
          <div id="lowStockList"></div>
        </div>
      </section>

      <!-- ---------- کالاها ---------- -->
      <section id="view-items" class="view">
        <div class="toolbar">
          <input type="text" id="itemSearch" class="search-input" data-i18n-placeholder="common.search" placeholder="جستجو...">
          <button class="btn primary" id="addItemBtn" data-i18n="common.add">افزودن</button>
        </div>
        <div id="itemsTable" class="table-wrap"></div>
      </section>

      <!-- ---------- مشتریان ---------- -->
      <section id="view-customers" class="view">
        <div class="toolbar">
          <input type="text" id="customerSearch" class="search-input" data-i18n-placeholder="common.search" placeholder="جستجو...">
          <button class="btn primary" id="addCustomerBtn" data-i18n="common.add">افزودن</button>
        </div>
        <div id="customersTable" class="table-wrap"></div>
      </section>

      <!-- ---------- تأمین‌کنندگان ---------- -->
      <section id="view-suppliers" class="view">
        <div class="toolbar">
          <input type="text" id="supplierSearch" class="search-input" data-i18n-placeholder="common.search" placeholder="جستجو...">
          <button class="btn primary" id="addSupplierBtn" data-i18n="common.add">افزودن</button>
        </div>
        <div id="suppliersTable" class="table-wrap"></div>
      </section>

      <!-- ---------- فاکتور خرید ---------- -->
      <section id="view-purchaseInvoices" class="view">
        <div class="toolbar">
          <input type="text" id="purchaseSearch" class="search-input" data-i18n-placeholder="common.search" placeholder="جستجو...">
        </div>
        <div id="purchaseInvoicesTable" class="table-wrap"></div>
      </section>

      <!-- ---------- فاکتور فروش ---------- -->
      <section id="view-salesInvoices" class="view">
        <div class="toolbar">
          <input type="text" id="salesSearch" class="search-input" data-i18n-placeholder="common.search" placeholder="جستجو...">
        </div>
        <div id="salesInvoicesTable" class="table-wrap"></div>
      </section>

      <!-- ---------- گزارش‌ها ---------- -->
      <section id="view-reports" class="view">
        <div class="cards-grid" id="reportCards"></div>
        <div class="panel">
          <h3 data-i18n="reports.recentActivity">فعالیت‌های اخیر</h3>
          <div id="recentActivity"></div>
        </div>
      </section>

      <!-- ---------- تنظیمات ---------- -->
      <section id="view-settings" class="view">
        <div class="panel">
          <h3 data-i18n="settings.currency">واحد پول</h3>
          <input type="text" id="currencyInput" class="text-input">
        </div>
        <div class="panel">
          <h3 data-i18n="settings.data">داده‌ها</h3>
          <button class="btn" id="exportBtn" data-i18n="settings.export">خروجی گرفتن (پشتیبان)</button>
          <button class="btn" id="importBtn" data-i18n="settings.import">وارد کردن پشتیبان</button>
          <input type="file" id="importFile" accept="application/json" class="hidden">
          <button class="btn danger" id="resetBtn" data-i18n="settings.reset">پاک‌سازی کامل داده‌ها</button>
        </div>
      </section>

    </div>
  </main>
</div>

<!-- ===================== مودال عمومی ===================== -->
<div id="modalOverlay" class="modal-overlay hidden">
  <div class="modal" id="modalBox"></div>
</div>

<!-- ===================== Toast ===================== -->
<div id="toastBox" class="toast-box"></div>

<!-- ===================== ناحیه چاپ فاکتور (فقط هنگام پرینت نمایش داده می‌شود) ===================== -->
<div id="printArea"></div>






<script>
const LOCALES = {
  "fa": {
    "meta": {

<script>
/* =========================================================
   Normalize.js
   ========================================================= */

const Normalize = {

  digitMap: {
    '۰':'0','۱':'1','۲':'2','۳':'3','۴':'4','۵':'5','۶':'6','۷':'7','۸':'8','۹':'9',
    '٠':'0','١':'1','٢':'2','٣':'3','٤':'4','٥':'5','٦':'6','٧':'7','٨':'8','٩':'9'
  },

  charMap: {
    'ي':'ی', 'ك':'ک', 'ة':'ه', 'ۀ':'ه', 'إ':'ا', 'أ':'ا', 'آ':'ا', 'ؤ':'و', 'ئ':'ی'
  },

  toEnglishDigits(str) {
    return String(str).replace(/[۰-۹٠-٩]/g, d => this.digitMap[d] ?? d);
  },

  unifyChars(str) {
    return String(str).replace(/[يكةۀإأآؤئ]/g, c => this.charMap[c] ?? c);
  },

  key(str) {
    if (!str) return '';
    let s = String(str).toLowerCase();
    s = this.toEnglishDigits(s);
    s = this.unifyChars(s);
    s = s.replace(/[\s\-_.,،؛؟!?()«»"'٫٬:؛]+/g, '');
    return s.trim();
  },

  softNormalize(str) {
    if (!str) return '';
    let s = String(str).toLowerCase();
    s = this.toEnglishDigits(s);
    s = this.unifyChars(s);
    s = s.replace(/[،؛]/g, ',').replace(/\s+/g, ' ').trim();
    return s;
  },

  levenshtein(a, b) {
    if (a === b) return 0;
    const al = a.length, bl = b.length;
    if (al === 0) return bl;
    if (bl === 0) return al;
    const dp = new Array(bl + 1);
    for (let j = 0; j <= bl; j++) dp[j] = j;
    for (let i = 1; i <= al; i++) {
      let prev = dp[0];
      dp[0] = i;
      for (let j = 1; j <= bl; j++) {
        const tmp = dp[j];
        dp[j] = Math.min(
          dp[j] + 1,
          dp[j - 1] + 1,
          prev + (a[i - 1] === b[j - 1] ? 0 : 1)
        );
        prev = tmp;
      }
    }
    return dp[bl];
  },

  similarity(a, b) {
    const ka = this.key(a), kb = this.key(b);
    if (!ka || !kb) return 0;
    if (ka === kb) return 1;
    if (ka.includes(kb) || kb.includes(ka)) return 0.9;
    const dist = this.levenshtein(ka, kb);
    const maxLen = Math.max(ka.length, kb.length);
    return 1 - dist / maxLen;
  },

  smartSearch(query, entities, opts = {}) {
    const threshold = opts.threshold ?? 0.55;
    const limit = opts.limit ?? 5;
    const qKey = this.key(query);
    if (!qKey) return [];

    const results = [];
    for (const ent of entities) {
      const customValues = ent.customFields ? ent.customFields.map(f => f.value).filter(Boolean) : [];
      const customLabels = ent.customFields ? ent.customFields.map(f => f.label).filter(Boolean) : [];
      
      const names = [ent.name, ...(ent.aliases || []), ...customValues, ...customLabels].filter(Boolean);
      let best = 0;
      for (const n of names) {
        const s = this.similarity(qKey, this.key(n));
        if (this.key(n).includes(qKey) && qKey.length >= 2) best = Math.max(best, 0.95);
        best = Math.max(best, s);
      }
      if (best >= threshold) results.push({ entity: ent, score: best });
    }
    results.sort((a, b) => b.score - a.score);
    return results.slice(0, limit);
  },

  bestMatch(query, entities, opts = {}) {
    const r = this.smartSearch(query, entities, opts);
    return r.length ? r[0] : null;
  },

  extractCustomFieldsHeuristically(text) {
    const fields = [];
    const normText = this.toEnglishDigits(text);

    const unitExclude = /^(تا|عدد|دانه|تومان|ریال|هزار|میلیون|بار|دفعه|ریال|ت|توم)$/;
    const regex1 = /(\d+(?:\.\d+)?)\s*([آ-یa-zA-Z]+)/g;
    let match;
    while ((match = regex1.exec(normText)) !== null) {
      const value = match[1];
      const unit = match[2].trim();
      if (unit && !unitExclude.test(unit) && unit.length >= 2 && unit.length <= 8) {
        let label = unit;
        if (label.endsWith('ی') && label.length > 2) {
          label = label.slice(0, -1);
        }
        fields.push({ label: label, value: value + ' ' + unit });
      }
    }

    const propKeywords = ['رنگ', 'سایز', 'مدل', 'برند', 'نسخه', 'ابعاد', 'طرح', 'جنس', 'نوع'];
    propKeywords.forEach(prop => {
      const regex2 = new RegExp(`${prop}\\s+([آ-یa-zA-Z0-9]+)`, 'i');
      const m = normText.match(regex2);
      if (m) {
        fields.push({ label: prop, value: m[1].trim() });
      }
    });

    const unique = [];
    const seen = new Set();
    fields.forEach(f => {
      const k = this.key(f.label);
      if (!seen.has(k)) {
        seen.add(k);
        unique.push(f);
      }
    });
    return unique;
  },

  mergeCustomFields(existingFields, newFields) {
    const merged = [...(existingFields || [])];
    newFields.forEach(nf => {
      if (nf && nf.label && nf.value) {
        const idx = merged.findIndex(f => f && f.label && this.key(f.label) === this.key(nf.label));
        if (idx >= 0) {
          merged[idx].value = nf.value;
        } else {
          merged.push(nf);
        }
      }
    });
    return merged;
  },

  getBaseName(itemPhrase, customFields) {
    let base = itemPhrase || '';
    const list = customFields || [];
    list.forEach(f => {
      if (f && f.label) {
        base = base.split(f.label).join(' ');
      }
      if (f && f.value) {
        const valWords = String(f.value).split(/\s+/);
        valWords.forEach(w => {
          if (w && w.length > 1) {
            base = base.split(w).join(' ');
          }
        });
      }
    });
    return base.replace(/\s+/g, ' ').trim();
  },

  areCustomFieldsMatching(fieldsA, fieldsB) {
    const normA = (fieldsA || []).filter(f => f && f.label && f.value && f.label.trim() && f.value.trim());
    const normB = (fieldsB || []).filter(f => f && f.label && f.value && f.label.trim() && f.value.trim());
    if (normA.length !== normB.length) return false;
    for (const fA of normA) {
      const keyA = this.key(fA.label);
      const valA = this.key(fA.value);
      const fB = normB.find(f => f && f.label && this.key(f.label) === keyA);
      if (!fB || this.key(fB.value) !== valA) return false;
    }
    return true;
  },

  findVariantMatch(itemPhrase, customFields, items) {
    const qBase = this.key(this.getBaseName(itemPhrase, customFields));
    if (!qBase) return null;

    const matchingBaseItems = items.filter(item => {
      const itemBase = this.key(item.name);
      return itemBase === qBase || this.similarity(itemBase, qBase) > 0.85;
    });

    if (matchingBaseItems.length === 0) return null;

    const exactMatch = matchingBaseItems.find(item =>
      this.areCustomFieldsMatching(item.customFields, customFields)
    );

    if (exactMatch) {
      return { entity: exactMatch, score: 1.0 };
    }

    return null;
  }
};

</script>

/* =========================================================
   I18n.js — مدیریت زبان و پیام‌ها
   ========================================================= */

const I18n = {
  current: 'fa',
  dict: {},

  t(key, vars) {
    const parts = key.split('.');
    let node = this.dict;
    for (const p of parts) { node = node && node[p]; }
    if (node == null) return key;
    let str = String(node);
    if (vars) {
      Object.keys(vars).forEach(k => { str = str.replace(`{${k}}`, vars[k]); });
    }
    return str;
  },

  hints() {
    return this.dict.hints || [];
  },

  meta() {
    return this.dict.meta || {};
  },

  async setLanguage(code) {
    const data = LOCALES[code];
    if (!data) throw new Error('locale not found: ' + code);
    this.current = code;
    this.dict = data;
    document.documentElement.lang = code;
    document.documentElement.dir = data.meta.dir || 'rtl';
    this.applyToDOM();
    window.dispatchEvent(new CustomEvent('langchange', { detail: code }));
  },

  applyToDOM() {
    document.querySelectorAll('[data-i18n]').forEach(el => {
      el.textContent = this.t(el.getAttribute('data-i18n'));
    });
    document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
      el.placeholder = this.t(el.getAttribute('data-i18n-placeholder'));
    });
  },

  formatNumber(n) {
    n = Number(n) || 0;
    try {
      return n.toLocaleString('fa-IR');
    } catch (e) {
      return String(n);
    }
  },

  formatCurrency(n) {
    return `${this.formatNumber(n)} ${this.meta().currencySymbol || ''}`;
  },

  formatDate(ts) {
    const d = new Date(ts);
    try {
      return d.toLocaleDateString('fa-IR');
    } catch (e) {
      return d.toLocaleDateString();
    }
  }
};

<script>
/* =========================================================
   DB.js — لایه ذخیره‌سازی آفلاین
   ========================================================= */

const DB = {
  PREFIX: 'bizflow_db__',
  _cache: {},

  open() {
    return Promise.resolve();
  },

  _readStore(store) {
    if (this._cache[store]) return this._cache[store];
    try {
      const raw = localStorage.getItem(this.PREFIX + store);
      const obj = raw ? JSON.parse(raw) : {};
      this._cache[store] = obj;
      return obj;
    } catch (e) {
      this._cache[store] = {};
      return this._cache[store];
    }
  },

  _writeStore(store, obj) {
    this._cache[store] = obj;
    try {
      localStorage.setItem(this.PREFIX + store, JSON.stringify(obj));
    } catch (e) {
      console.error('DB write error', store, e);
    }
  },

  put(store, value) {
    return new Promise((resolve) => {
      const key = store === 'settings' || store === 'counters' ? value.key : value.id;
      const obj = this._readStore(store);
      obj[key] = value;
      this._writeStore(store, obj);
      resolve(value);
    });
  },

  get(store, id) {
    return new Promise((resolve) => {
      const obj = this._readStore(store);
      resolve(obj[id] || null);
    });
  },

  getAll(store) {
    return new Promise((resolve) => {
      const obj = this._readStore(store);
      resolve(Object.values(obj));
    });
  },

  delete(store, id) {
    return new Promise((resolve) => {
      const obj = this._readStore(store);
      delete obj[id];
      this._writeStore(store, obj);
      resolve(true);
    });
  },

  clearStore(store) {
    return new Promise((resolve) => {
      this._writeStore(store, {});
      resolve(true);
    });
  },

  async clearAll() {
    const stores = ['items','customers','suppliers','purchaseInvoices','salesInvoices','timeline','counters'];
    for (const s of stores) await this.clearStore(s);
  },

  async nextId(counterKey) {
    const c = await this.get('counters', counterKey);
    const next = (c?.value || 0) + 1;
    await this.put('counters', { key: counterKey, value: next });
    return next;
  },

  uid() {
    return 'id_' + Date.now().toString(36) + '_' + Math.random().toString(36).slice(2, 8);
  },

  async addTimeline(entry) {
    entry.id = this.uid();
    entry.ts = entry.ts || Date.now();
    await this.put('timeline', entry);
    return entry;
  },

  async getTimelineFor(refType, refId) {
    const all = await this.getAll('timeline');
    return all
      .filter(t => t.refType === refType && t.refId === refId)
      .sort((a, b) => b.ts - a.ts);
  },

  async getRecentTimeline(limit = 20) {
    const all = await this.getAll('timeline');
    return all.sort((a, b) => b.ts - a.ts).slice(0, limit);
  },

  async exportAll() {
    const stores = ['items','customers','suppliers','purchaseInvoices','salesInvoices','timeline','counters','settings'];
    const dump = {};
    for (const s of stores) dump[s] = await this.getAll(s);
    dump._exportedAt = Date.now();
    dump._version = 2;
    return dump;
  },

  async importAll(dump) {
    const stores = ['items','customers','suppliers','purchaseInvoices','salesInvoices','timeline','counters','settings'];
    await this.clearAll();
    await this.clearStore('settings');
    for (const s of stores) {
      if (Array.isArray(dump[s])) {
        for (const row of dump[s]) await this.put(s, row);
      }
    }
  }
};

      { op: 'QUERY_SALES', words: ['فروش امروز','فروش این ماه','گزارش فروش','فروش را نشان'] },
      { op: 'QUERY_PROFIT',words: ['سود چقدر','سود این ماه','سود امروز','چقدر سود'] },

    qtyWords: { 'یک':1,'دو':2,'سه':3,'چهار':4,'پنج':5,'شش':6,'هفت':7,'هشت':8,'نه':9,'ده':10 },

    },

    unitNoise: ['تا','عدد','دانه','تومان','هزار تومان','میلیون','ریال'],

const NLU = {
  currentLang: 'fa',
  rules() { return LangRules[this.currentLang] || LangRules.fa; },

  setLang(code) {

  detectIntent(rawText) {
